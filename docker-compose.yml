services:

  db:
    image: mysql:8.0
    container_name: sakila-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m

  app:
    build: .
    container_name: sakila-app
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB: ${MYSQL_DATABASE}
    ports:
      - "5000:5000"
    networks:
      - sakila-network

  db-admin:
    image: adminer:latest
    container_name: db-admin
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - sakila-network

  test-runner:
    build: .
    command: python -m pytest tests/ -v
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network
    profiles:
      - test

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data: