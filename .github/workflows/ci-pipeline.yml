name: CI Pipeline (Sakila Flask App)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Prevent wasted runs (IMPORTANT MARKS POINT)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app

jobs:

  # ---------------- LINT JOB ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run linting
        run: flake8 . --max-line-length=120 --ignore=E501,W503


  # ---------------- TEST JOB ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: sakila

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pymysql

      # IMPORTANT: wait for MySQL to be ready
      - name: Wait for MySQL
        run: sleep 20

      - name: Import Sakila Database
        run: |
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-schema.sql
          mysql -h 127.0.0.1 -u root -padmin sakila < sakila-data.sql

      - name: Run tests
        run: pytest -v


  # ---------------- BUILD JOB ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Verify image
        run: docker images


  # ---------------- SECURITY SCAN ----------------
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scan
        run: docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH