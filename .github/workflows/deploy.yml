name: Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  contents: write

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Print Environment Variables
        run: |
          echo "APP_ENV=staging"
          echo "IMAGE_TAG=staging"

      - name: Simulate Docker Run
        run: echo "Running sakila-app:staging"

      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

      - name: Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Status: Success" >> $GITHUB_STEP_SUMMARY
          echo "Image: sakila-app:staging" >> $GITHUB_STEP_SUMMARY

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Simulate Production Deployment
        run: echo "Deploying to production environment"

      - name: Notification
        run: echo "Slack notification: Production deployment successful"

      - name: Get Date Tag
        id: date
        run: echo "TAG=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: Release ${{ steps.date.outputs.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}