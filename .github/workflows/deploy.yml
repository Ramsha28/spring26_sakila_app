name: CD Deployment Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Staging Deployment
        run: echo "Deploying to STAGING environment..."

      - name: Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "Status: Success" >> $GITHUB_STEP_SUMMARY

      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Production Deployment
        run: echo "Deploying to PRODUCTION environment..."

      - name: Notification
        run: echo "Slack notification: Production deployment successful"

      - name: Create Release Date
        id: date
        run: echo "TAG=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.TAG }}
          name: Release ${{ steps.date.outputs.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}